<!doctype html>
<html lang="en">
  <head>
    <link rel="manifest" href="/manifest.json">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaizen Habits</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="skip-splash">
    <!-- SPLASH SCREEN -->
    <div id="splashScreen" class="splash">
      <img src="/kaizen-app/icon.png" class="splash-logo" />
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-buttons">
        <a href="index.html" class="nav-btn">Home</a>
        <a href="tasks.html" class="nav-btn">Tasks</a>
        <a href="habits.html" class="nav-btn">Habits</a>
        <a href="notes.html" class="nav-btn">Notes</a>
        <a href="projects.html" class="nav-btn">Projects</a>
        <a href="micro.html" class="nav-btn">Micro</a>
      </div>
    </nav>

    <main class="page-wrapper">

      <!-- TOP CONTROLS -->
      <div class="top-controls">
        <div class="mode-toggle">
          <button id="simpleModeBtn" class="mode-btn">Simple Mode</button>
          <button id="advancedModeBtn" class="mode-btn">Advanced Mode</button>
        </div>

        <div class="dark-toggle">
          <button id="darkModeBtn" class="dark-btn">Dark Mode</button>
        </div>
      </div>

      <!-- HEADER -->
      <section class="page-header">
        <h1>Daily Habits</h1>
        <p>Type a habit and press Enter to add it.</p>
      </section>

      <!-- HABIT INPUT -->
      <section class="card">
        <input id="habitInput" placeholder="Add a habit...">
      </section>

      <!-- HABIT LIST -->
      <section class="card">
        <h2>Your Habits</h2>
        <div id="habitList" class="habit-list"></div>
      </section>

    </main>

    <!-- SERVICE WORKER -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js");
      }
    </script>

    <!-- MAIN JAVASCRIPT -->
    <script type="module" src="/src/main.js"></script>

  </body>
</html>
